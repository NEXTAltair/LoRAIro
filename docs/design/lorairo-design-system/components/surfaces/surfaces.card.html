<!DOCTYPE html>
<html lang="en">
<head>

<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); color: var(--text-body); background: var(--paper); }
  #root { padding: var(--gap-4); display: flex; flex-direction: column; gap: var(--gap-3); }
  .frame { border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>

<body>
<div id="root"></div>
<script type="text/babel">
  const { Tabs, Terminal, Dialog, Button, Menu } = window.LoRAIroDesignSystem_64d8f7;
  const T = Terminal;
  function Demo() {
    const [tab, setTab] = React.useState("annotate");
    const [open, setOpen] = React.useState(true);
    const tabs = [
      { id: "search", label: "検索" }, { id: "map", label: "マップ" },
      { id: "annotate", label: "アノテーション" }, { id: "jobs", label: "ジョブ" },
      { id: "errors", label: "エラー" }, { id: "cli", label: "CLI" },
    ];
    return (
      <React.Fragment>
        <div className="frame"><Tabs tabs={tabs} active={tab} onChange={setTab} /></div>
        <Terminal>
          <T.Muted>$ lorairo-cli annotate run --models wd-eva02 --json</T.Muted>{"\n"}
          {"{"}<T.K>"kind"</T.K>:<T.S>"item"</T.S>,<T.K>"image_id"</T.K>:<T.N>42</T.N>,<T.K>"tags"</T.K>:[<T.S>"1girl"</T.S>,<T.S>"outdoor"</T.S>]{"}"}{"\n"}
          {"{"}<T.K>"kind"</T.K>:<T.S>"result"</T.S>,<T.K>"count"</T.K>:<T.N>128</T.N>,<T.K>"has_more"</T.K>:<T.B>false</T.B>{"}"}
        </Terminal>
        <div style={{ display: "flex", gap: "var(--gap-2)" }}>
          <Button onClick={() => setOpen(true)}>確認ダイアログを開く</Button>
          <Menu
            trigger={<Button variant="ghost">サムネイル ▾</Button>}
            items={[
              { label: "スコア降順", value: "score", glyph: "▾", shortcut: "⌘1" },
              { label: "登録日時", value: "date", glyph: "▸" },
              { label: "解像度", value: "res", glyph: "▸" },
              { separator: true },
              { label: "この画像を skip", value: "skip", glyph: "×", danger: true },
            ]}
            onSelect={() => {}}
          />
        </div>
        <Dialog open={open} onClose={() => setOpen(false)} variant="confirm"
          title="アノテーションを破棄" confirmLabel="破棄" cancelLabel="キャンセル">
          未保存の手動編集が <b>3 件</b> あります。破棄して次の画像へ進みますか？
        </Dialog>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
