<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoRAIro — 操作可能レイアウト</title>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 16px 56px; background: var(--paper-shade); color: var(--text-body); font-family: var(--font-sans); font-size: var(--fs-base); line-height: var(--lh-base); }
  .win { max-width: 1180px; margin: 0 auto; border: 1px solid var(--line-strong); border-radius: var(--radius-shell); background: var(--paper); overflow: hidden; box-shadow: var(--shadow-shell); }
  .titlebar { display: flex; align-items: center; gap: var(--gap-3); padding: 8px 14px; background: var(--paper-shade); border-bottom: 1px solid var(--line); }
  .wm { font-weight: 700; font-size: var(--fs-h2); letter-spacing: .02em; }
  .wm .iro { color: var(--accent); }
  .proj { font-family: var(--font-mono); font-size: var(--fs-small); color: var(--ink-soft); }
  .tbtn { height: 26px; padding: 0 10px; border: 1px solid var(--line); border-radius: var(--radius); background: var(--card); cursor: pointer; color: var(--ink-soft); font-family: var(--font-sans); font-size: var(--fs-small); display: inline-flex; align-items: center; gap: 5px; }
  .tbtn:hover { border-color: var(--accent); color: var(--accent); }
  .tbtn.on { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .gear { width: 28px; height: 28px; padding: 0; justify-content: center; font-size: 14px; }
  .backbar { display: flex; align-items: center; gap: var(--gap-2); padding: 8px 14px; border-bottom: 1px solid var(--line); background: var(--card); }
  .body { padding: var(--gap-4); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
<script src="../ui_kits/lorairo-app/tagI18n.jsx"></script>
<script type="text/babel" src="../ui_kits/lorairo-app/SearchScreen.jsx"></script>
<script type="text/babel" src="../ui_kits/lorairo-app/MapScreen.jsx"></script>
<script type="text/babel" src="../ui_kits/lorairo-app/AnnotateScreen.jsx"></script>
<script type="text/babel" src="../ui_kits/lorairo-app/JobsScreen.jsx"></script>
<script type="text/babel" src="../ui_kits/lorairo-app/ResultsScreen.jsx"></script>
<script type="text/babel" src="../ui_kits/lorairo-app/ErrorsScreen.jsx"></script>
<script type="text/babel" src="../ui_kits/lorairo-app/ExportScreen.jsx"></script>
<script type="text/babel" src="../ui_kits/lorairo-app/CLIScreen.jsx"></script>
<script type="text/babel" src="../ui_kits/lorairo-app/SettingsScreen.jsx"></script>
<script type="text/babel" src="TagEditScreen.jsx"></script>
<script type="text/babel" src="StatesScreen.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const DS = window.LoRAIroDesignSystem_64d8f7;
  const { Tabs, Button, Chip } = DS;
  const KEY = "lorairo_interactive_view";

  const TABS = [
    { id: "search", label: "検索" },
    { id: "map", label: "マップ" },
    { id: "annotate", label: "アノテーション" },
    { id: "jobs", label: "ジョブ" },
    { id: "results", label: "結果" },
    { id: "errors", label: "エラー" },
    { id: "export", label: "エクスポート" },
    { id: "cli", label: "CLI" },
  ];

  function App() {
    const saved = (() => { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch (e) { return {}; } })();
    const [view, setView] = React.useState(saved.view || "search"); // tab id | "tagedit" | "states"
    const [staged, setStaged] = React.useState(9);
    const [running, setRunning] = React.useState(true);
    const [settings, setSettings] = React.useState(false);

    React.useEffect(() => { try { localStorage.setItem(KEY, JSON.stringify({ view })); } catch (e) {} }, [view]);

    const stage = () => setStaged((n) => n + 1);
    const run = () => { setRunning(true); setView("jobs"); };
    const isTab = TABS.some((t) => t.id === view);
    const activeTab = view === "tagedit" ? "results" : (isTab ? view : "");

    let screen;
    if (view === "search") screen = <window.SearchScreen staged={staged} onStage={stage} />;
    else if (view === "map") screen = <window.MapScreen />;
    else if (view === "annotate") screen = <window.AnnotateScreen staged={staged} onRun={run} />;
    else if (view === "jobs") screen = <window.JobsScreen running={running} />;
    else if (view === "results") screen = <window.ResultsScreen />;
    else if (view === "errors") screen = <window.ErrorsScreen />;
    else if (view === "export") screen = <window.ExportScreen />;
    else if (view === "cli") screen = <window.CLIScreen />;
    else if (view === "tagedit") screen = <window.TagEditScreen />;
    else if (view === "states") screen = <window.StatesScreen />;

    const back = (view === "tagedit" || view === "states");

    return (
      <div className="win">
        <div className="titlebar">
          <div className="wm">LoRA<span className="iro">Iro</span></div>
          <div className="proj">project: main_dataset_20260601_001</div>
          <div style={{ flex: 1 }} />
          <button className={"tbtn" + (view === "tagedit" ? " on" : "")} onClick={() => setView("tagedit")}>タグ編集</button>
          <button className={"tbtn" + (view === "states" ? " on" : "")} onClick={() => setView("states")}>状態カタログ</button>
          <button className="tbtn gear" title="設定" onClick={() => setSettings(true)}>⚙</button>
        </div>

        <Tabs tabs={TABS} active={activeTab} onChange={setView} />

        {back && (
          <div className="backbar">
            <Button size="small" variant="ghost" onClick={() => setView(view === "tagedit" ? "results" : "search")}>◂ 戻る</Button>
            <Chip kind="neutral" dot="none">{view === "tagedit" ? "FRAME 5B · タグ編集" : "FRAME 9 · 状態カタログ"}</Chip>
          </div>
        )}

        <div className="body">{screen}</div>

        {settings && <window.SettingsScreen onClose={() => setSettings(false)} />}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
