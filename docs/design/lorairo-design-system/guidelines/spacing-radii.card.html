<!-- @dsCard group="Spacing" viewport="700x160" name="Radii & elevation" subtitle="6px cards/buttons · 10px chips · 3px badges · flat inside, shell floats" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); color: var(--text-body); background: var(--paper); }
  .wrap { padding: var(--gap-4); display: flex; gap: var(--gap-4); align-items: center; }
  .box { width: 74px; height: 56px; background: var(--card); border: 1px solid var(--line-strong); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 4px; }
  .lab { font-family: var(--font-mono); font-size: var(--fs-small); color: var(--text-muted); }
  .lab b { display: block; color: var(--text-body); }
  .cell { text-align: center; }
  .cell > .lab { margin-top: 6px; }
  .shell { width: 110px; height: 56px; background: var(--paper); border: 1px solid var(--line-strong); border-radius: var(--radius-shell); box-shadow: var(--shadow-shell); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="cell"><div class="box" style="border-radius:6px"><span class="lab">6px</span></div><div class="lab"><b>--radius</b>card/btn</div></div>
    <div class="cell"><div class="box" style="border-radius:10px"><span class="lab">10px</span></div><div class="lab"><b>--radius-chip</b>chip</div></div>
    <div class="cell"><div class="box" style="border-radius:3px"><span class="lab">3px</span></div><div class="lab"><b>--radius-badge</b>badge</div></div>
    <div class="cell"><div class="shell"></div><div class="lab"><b>--shadow-shell</b>window only</div></div>
  </div>
</body>
</html>
