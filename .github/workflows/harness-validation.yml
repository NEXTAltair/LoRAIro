name: Harness Validation

on:
  push:
    branches: [main]
    paths:
      - ".agents/skills/**"
      - ".claude/**"
      - "CLAUDE.md"
      - "scripts/install_agent_skills.py"
      - "scripts/validate_docs.py"
      - "scripts/validate_harness.py"
      - "skills-lock.json"
  pull_request:
    branches: [main]
    paths:
      - ".agents/skills/**"
      - ".claude/**"
      - "CLAUDE.md"
      - "scripts/install_agent_skills.py"
      - "scripts/validate_docs.py"
      - "scripts/validate_harness.py"
      - "skills-lock.json"

jobs:
  validate-harness:
    name: Validate Agent Harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 外部ソース skill は git 追跡しないため、fresh checkout で skills-lock.json から
      # 実際に復元できること (source/skillPath/hash の整合) を CI で検証する。
      # 復元後の computedHash 照合まで scripts/install_agent_skills.py が行う
      - name: Restore external skills from lock
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/install_agent_skills.py

      - name: Validate harness (skills, hooks, settings)
        run: python scripts/validate_harness.py

      - name: Validate documentation consistency
        run: python scripts/validate_docs.py
