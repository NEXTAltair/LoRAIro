name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  QT_QPA_PLATFORM: offscreen
  PYTHONDONTWRITEBYTECODE: "1"
  UV_SYSTEM_PYTHON: "1"

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --dev

      - name: Check format
        run: uv run ruff format src/ tests/ --check

      - name: Check lint
        run: uv run ruff check src/ tests/

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --dev

      - name: Generate Qt UI files
        run: uv run python scripts/generate_ui.py

      - name: Run mypy
        run: uv run mypy -p lorairo

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install Qt system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libgl1-mesa-dri libegl1 \
            libglib2.0-0 libxrender1 libxtst6 libxi6 libxrandr2 \
            libxkbcommon0 libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 \
            libdbus-1-3 libgtk-3-0 \
            fonts-noto-cjk

      - name: Install dependencies
        run: uv sync --dev

      - name: Generate Qt UI files
        run: uv run python scripts/generate_ui.py

      - name: Run unit tests
        run: |
          uv run pytest tests/unit \
            -m "not gui_show and not real_api and not slow" \
            --cov=src \
            --cov=local_packages/genai-tag-db-tools/src/genai_tag_db_tools \
            --cov=local_packages/image-annotator-lib/src/image_annotator_lib \
            --cov-report=xml:coverage-unit.xml \
            --cov-report=term-missing \
            --timeout=120 \
            -x

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit
          path: coverage-unit.xml

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install Qt system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libgl1-mesa-dri libegl1 \
            libglib2.0-0 libxrender1 libxtst6 libxi6 libxrandr2 \
            libxkbcommon0 libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 \
            libdbus-1-3 libgtk-3-0 \
            fonts-noto-cjk

      - name: Install dependencies
        run: uv sync --dev

      - name: Generate Qt UI files
        run: uv run python scripts/generate_ui.py

      - name: Run integration tests
        run: |
          uv run pytest tests/integration tests/bdd \
            -m "not gui_show and not real_api and not slow" \
            --cov=src \
            --cov=local_packages/genai-tag-db-tools/src/genai_tag_db_tools \
            --cov=local_packages/image-annotator-lib/src/image_annotator_lib \
            --cov-report=xml:coverage-integration.xml \
            --cov-report=term-missing \
            --timeout=300 \
            -x

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-integration
          path: coverage-integration.xml
