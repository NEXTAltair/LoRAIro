name: Agent PR Maintainer

on:
  pull_request:
    types: [opened, ready_for_review, synchronize, reopened, labeled]
  pull_request_review:
    types: [submitted, edited]
  issue_comment:
    types: [created, edited]
  workflow_dispatch:
    inputs:
      pr:
        required: true
        description: PR number or URL

permissions:
  contents: write
  pull-requests: write
  checks: read
  actions: read
  issues: write

jobs:
  maintain:
    name: Observe agent PR
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        (
          contains(github.event.pull_request.labels.*.name, 'agent-pr') ||
          startsWith(github.event.pull_request.title, '[codex]') ||
          startsWith(github.event.pull_request.title, '[claude]')
        )
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        (
          contains(github.event.pull_request.labels.*.name, 'agent-pr') ||
          startsWith(github.event.pull_request.title, '[codex]') ||
          startsWith(github.event.pull_request.title, '[claude]')
        )
      ) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        (
          contains(github.event.comment.body, '@codex') ||
          github.event.comment.user.login == 'chatgpt-codex-connector[bot]'
        )
      )
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.CODEX_BOT_TOKEN || github.token }}
      PR: ${{ github.event_name == 'workflow_dispatch' && inputs.pr || github.event.pull_request.number || github.event.issue.number }}
      AGENT_PR_AUTO_MERGE: ${{ vars.AGENT_PR_AUTO_MERGE || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Verify agent PR scope
        id: scope
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "is_agent_pr=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          is_agent_pr="$(gh pr view "$PR" --json title,labels \
            -q 'if ((.labels | map(.name) | index("agent-pr")) or (.title | startswith("[codex]")) or (.title | startswith("[claude]"))) then "true" else "false" end')"
          echo "is_agent_pr=${is_agent_pr}" >> "${GITHUB_OUTPUT}"

      - name: Checkout PR branch
        if: steps.scope.outputs.is_agent_pr == 'true'
        run: gh pr checkout "$PR"

      - name: Normalize PR state and trigger Codex review
        if: steps.scope.outputs.is_agent_pr == 'true' && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
        run: |
          gh pr ready "$PR" || true
          gh pr comment "$PR" \
            --body '@codex review for security regressions, missing tests, and risky behavior changes.' \
            || true

      - name: Inspect PR state
        if: steps.scope.outputs.is_agent_pr == 'true'
        run: |
          gh pr view "$PR" --json \
            number,title,isDraft,headRefName,headRefOid,baseRefName,mergeStateStatus,reviewDecision,statusCheckRollup,labels \
            > pr-state.json
          gh pr checks "$PR" --json name,state,bucket,link,startedAt,completedAt,workflow \
            > pr-checks.json
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR}/reviews" > pr-reviews.json
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR}/comments" > pr-review-comments.json
          gh api "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" > pr-issue-comments.json
          gh api "repos/${GITHUB_REPOSITORY}/issues/${PR}/reactions" > pr-reactions.json

      - name: Persist watcher state marker
        if: steps.scope.outputs.is_agent_pr == 'true'
        run: |
          gh pr view "$PR" --json body -q .body > pr-body.md
          python scripts/agent_pr_state.py update-body \
            --body-file pr-body.md \
            --state-file pr-state.json \
            --status observing \
            --output pr-body-updated.md
          gh pr edit "$PR" --body-file pr-body-updated.md

      - name: Check forbidden automatic-repair changes
        if: steps.scope.outputs.is_agent_pr == 'true'
        run: python scripts/check_agent_forbidden_changes.py --base-ref origin/main --state-marker-body pr-body-updated.md

      - name: Check Codex review gate
        if: steps.scope.outputs.is_agent_pr == 'true'
        run: |
          python scripts/check_codex_review_gate.py \
            --reviews pr-reviews.json \
            --review-comments pr-review-comments.json \
            --issue-comments pr-issue-comments.json \
            --reactions pr-reactions.json

      - name: Enable auto-merge when explicitly allowed
        if: steps.scope.outputs.is_agent_pr == 'true' && env.AGENT_PR_AUTO_MERGE == 'true'
        run: |
          HEAD_SHA="$(python -c 'import json; print(json.load(open("pr-state.json"))["headRefOid"])')"
          gh pr merge "$PR" \
            --squash \
            --auto \
            --delete-branch \
            --match-head-commit "$HEAD_SHA"

      - name: Upload observer artifacts
        if: always() && steps.scope.outputs.is_agent_pr == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: agent-pr-maintainer-${{ github.run_id }}
          path: |
            pr-state.json
            pr-checks.json
            pr-reviews.json
            pr-review-comments.json
            pr-issue-comments.json
            pr-reactions.json
