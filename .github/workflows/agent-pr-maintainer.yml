name: Agent PR Maintainer

on:
  pull_request_target:
    types: [opened, ready_for_review, synchronize, reopened, labeled]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]
  issue_comment:
    types: [created, edited, deleted]
  workflow_dispatch:
    inputs:
      pr:
        required: true
        description: PR number or URL

permissions:
  contents: read
  pull-requests: write
  checks: read
  actions: read
  issues: read

jobs:
  maintain:
    name: Observe agent PR
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request_target' &&
        (
          contains(github.event.pull_request.labels.*.name, 'agent-pr') ||
          startsWith(github.event.pull_request.title, '[codex]') ||
          startsWith(github.event.pull_request.title, '[claude]')
        )
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        (
          contains(github.event.pull_request.labels.*.name, 'agent-pr') ||
          startsWith(github.event.pull_request.title, '[codex]') ||
          startsWith(github.event.pull_request.title, '[claude]')
        )
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        (
          contains(github.event.pull_request.labels.*.name, 'agent-pr') ||
          startsWith(github.event.pull_request.title, '[codex]') ||
          startsWith(github.event.pull_request.title, '[claude]')
        )
      ) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
          (
            github.event.comment.user.login == 'chatgpt-codex-connector[bot]' ||
            github.event.comment.user.login == 'chatgpt-codex-connector'
          )
      )
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      PR: ${{ github.event_name == 'workflow_dispatch' && inputs.pr || github.event.pull_request.number || github.event.issue.number }}
      AGENT_PR_AUTO_MERGE: ${{ vars.AGENT_PR_AUTO_MERGE || 'false' }}

    steps:
      - name: Verify agent PR scope
        id: scope
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            is_agent_pr="$(gh pr view "$PR" --json title,labels \
              -q 'if ((.labels | map(.name) | index("agent-pr")) or (.title | startswith("[codex]")) or (.title | startswith("[claude]"))) then "true" else "false" end')"
            head_sha="$(gh pr view "$PR" --json headRefOid -q .headRefOid)"
            base_ref="$(gh pr view "$PR" --json baseRefName -q .baseRefName)"
            echo "is_agent_pr=${is_agent_pr}" >> "${GITHUB_OUTPUT}"
            echo "head_sha=${head_sha}" >> "${GITHUB_OUTPUT}"
            echo "base_ref=${base_ref}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          is_agent_pr="$(gh pr view "$PR" --json title,labels \
            -q 'if ((.labels | map(.name) | index("agent-pr")) or (.title | startswith("[codex]")) or (.title | startswith("[claude]"))) then "true" else "false" end')"
          head_sha="$(gh pr view "$PR" --json headRefOid -q .headRefOid)"
          base_ref="$(gh pr view "$PR" --json baseRefName -q .baseRefName)"
          echo "is_agent_pr=${is_agent_pr}" >> "${GITHUB_OUTPUT}"
          echo "head_sha=${head_sha}" >> "${GITHUB_OUTPUT}"
          echo "base_ref=${base_ref}" >> "${GITHUB_OUTPUT}"

      - name: Checkout trusted policy scripts
        if: steps.scope.outputs.is_agent_pr == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.scope.outputs.base_ref }}
          fetch-depth: 0
          submodules: recursive
          path: trusted

      - name: Checkout PR branch for diff inspection
        if: steps.scope.outputs.is_agent_pr == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ steps.scope.outputs.head_sha }}
          fetch-depth: 0
          submodules: recursive
          path: pr

      - name: Normalize PR state
        if: steps.scope.outputs.is_agent_pr == 'true' && (github.event_name == 'pull_request_target' || github.event_name == 'workflow_dispatch')
        working-directory: trusted
        run: |
          gh pr ready "$PR" || true

      - name: Inspect PR state
        if: steps.scope.outputs.is_agent_pr == 'true'
        working-directory: trusted
        run: |
          gh pr view "$PR" --json \
            number,title,isDraft,headRefName,headRefOid,baseRefName,mergeStateStatus,reviewDecision,statusCheckRollup,labels \
            > pr-state.json
          set +e
          gh pr checks "$PR" --json name,state,bucket,link,startedAt,completedAt,workflow \
            > pr-checks.json
          checks_status="$?"
          set -e
          if [ "$checks_status" -ne 0 ] && [ "$checks_status" -ne 8 ]; then
            exit "$checks_status"
          fi
          gh api --paginate --slurp "repos/${GITHUB_REPOSITORY}/pulls/${PR}/reviews" > pr-reviews.json
          gh api --paginate --slurp "repos/${GITHUB_REPOSITORY}/pulls/${PR}/comments" > pr-review-comments.json
          gh api --paginate --slurp "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" > pr-issue-comments.json
          gh api --paginate --slurp "repos/${GITHUB_REPOSITORY}/issues/${PR}/reactions" > pr-reactions.json

      - name: Persist watcher state marker
        if: steps.scope.outputs.is_agent_pr == 'true'
        working-directory: trusted
        run: |
          gh pr view "$PR" --json body -q .body > pr-body.md
          python scripts/agent_pr_state.py update-body \
            --body-file pr-body.md \
            --state-file pr-state.json \
            --output pr-body-updated.md
          gh pr edit "$PR" --body-file pr-body-updated.md

      - name: Check forbidden automatic-repair changes
        if: steps.scope.outputs.is_agent_pr == 'true'
        working-directory: pr
        run: |
          BASE_REF="$(python ../trusted/scripts/agent_pr_state.py base-ref --state-file ../trusted/pr-state.json)"
          git fetch origin "${BASE_REF}"
          python ../trusted/scripts/check_agent_forbidden_changes.py \
            --base-ref "origin/${BASE_REF}" \
            --state-marker-body ../trusted/pr-body-updated.md \
            --bootstrap-workflow .github/workflows/agent-pr-maintainer.yml

      - name: Check Codex review gate
        id: codex_gate
        if: steps.scope.outputs.is_agent_pr == 'true' && github.event_name != 'pull_request_target'
        working-directory: trusted
        run: |
          python scripts/check_codex_review_gate.py \
            --head-sha "$(python scripts/agent_pr_state.py head-sha --state-file pr-state.json)" \
            --reviews pr-reviews.json \
            --review-comments pr-review-comments.json \
            --issue-comments pr-issue-comments.json \
            --reactions pr-reactions.json

      - name: Defer Codex review gate until review artifact event
        if: steps.scope.outputs.is_agent_pr == 'true' && github.event_name == 'pull_request_target'
        run: |
          echo "Codex review gate is observing only on pull_request_target events."
          echo "A pull_request_review or trusted Codex issue_comment event will evaluate the current head review artifact."

      - name: Enable auto-merge when explicitly allowed
        if: >-
          steps.scope.outputs.is_agent_pr == 'true' &&
          env.AGENT_PR_AUTO_MERGE == 'true' &&
          github.event_name != 'pull_request_target' &&
          steps.codex_gate.outcome == 'success'
        working-directory: trusted
        run: |
          HEAD_SHA="$(python -c 'import json; print(json.load(open("pr-state.json"))["headRefOid"])')"
          gh pr merge "$PR" \
            --squash \
            --auto \
            --delete-branch \
            --match-head-commit "$HEAD_SHA"

      - name: Upload observer artifacts
        if: always() && steps.scope.outputs.is_agent_pr == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: agent-pr-maintainer-${{ github.run_id }}
          path: |
            trusted/pr-state.json
            trusted/pr-checks.json
            trusted/pr-reviews.json
            trusted/pr-review-comments.json
            trusted/pr-issue-comments.json
            trusted/pr-reactions.json
